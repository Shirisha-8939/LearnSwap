<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sessions - LearnSwap</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Chat Modal Styles */
        .chat-modal {
            max-width: 600px;
            height: 600px;
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow: hidden;
        }
        
        .chat-header {
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            position: relative;
            margin-bottom: 0.5rem;
            word-wrap: break-word;
        }
        
        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 0;
        }
        
        .message.received {
            align-self: flex-start;
            background: white;
            color: #1e293b;
            border-bottom-left-radius: 0;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }
        
        .message .sender-name {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            opacity: 0.8;
        }
        
        .message.sent .sender-name {
            color: rgba(255,255,255,0.9);
        }
        
        .message.received .sender-name {
            color: #667eea;
        }
        
        .message .message-time {
            font-size: 0.625rem;
            margin-top: 0.25rem;
            opacity: 0.6;
            text-align: right;
        }
        
        /* Link styling */
        .message a {
            color: inherit;
            text-decoration: underline;
            word-break: break-all;
        }
        
        .message.sent a {
            color: white;
        }
        
        .message.received a {
            color: #2563eb;
        }
        
        /* Meeting link button */
        .meeting-link-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        
        .meeting-link-btn:hover {
            background: #059669;
        }
        
        .chat-input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            background: white;
            border-top: 1px solid #e2e8f0;
        }
        
        .chat-input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 2rem;
            outline: none;
        }
        
        .chat-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .chat-send-btn {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
        }
        
        .chat-send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .meeting-links-panel {
            background: #f1f5f9;
            border-radius: 0.5rem;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
        }
        
        .meeting-links-title {
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }
        
        .meeting-link-item {
            background: white;
            padding: 0.5rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .meeting-link-item a {
            color: #2563eb;
            text-decoration: none;
            word-break: break-all;
            font-size: 0.875rem;
        }
        
        .meeting-link-item a:hover {
            text-decoration: underline;
        }
        
        .copy-link-btn {
            background: #e2e8f0;
            border: none;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            cursor: pointer;
            font-size: 0.75rem;
        }
        
        .copy-link-btn:hover {
            background: #cbd5e1;
        }
        
        .loading-container {
            text-align: center;
            padding: 3rem;
        }
        
        .error-container {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 1rem;
            box-shadow: var(--shadow-md);
        }
        
        .error-icon {
            font-size: 3rem;
            color: var(--danger-color);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-exchange-alt"></i> <span>LearnSwap</span></h2>
            </div>
            
            <div class="user-info">
                <div class="user-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="user-name" id="userName">Loading...</div>
                <div class="user-credits" id="userCredits">Credits: 0</div>
            </div>
            
            <div class="sidebar-menu">
                <a href="dashboard.html">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="browse-skills.html">
                    <i class="fas fa-search"></i>
                    <span>Browse Skills</span>
                </a>
                <a href="my-sessions.html" class="active">
                    <i class="fas fa-calendar"></i>
                    <span>My Sessions</span>
                </a>
                <a href="add-skill.html">
                    <i class="fas fa-plus-circle"></i>
                    <span>Add Skill</span>
                </a>
                <a href="profile.html">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
<a href="#" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <h1>My Sessions</h1>
            
            <!-- Session Tabs -->
            <div class="tabs">
                <button class="tab-btn active" onclick="filterSessions('all')">All</button>
                <button class="tab-btn" onclick="filterSessions('pending')">Pending</button>
                <button class="tab-btn" onclick="filterSessions('accepted')">Accepted</button>
                <button class="tab-btn" onclick="filterSessions('ongoing')">Ongoing</button>
                <button class="tab-btn" onclick="filterSessions('completed')">Completed</button>
            </div>
            
            <!-- Sessions List -->
            <div id="sessionsList" class="sessions-list">
                <div class="loading-container">
                    <div class="spinner"></div>
                    <p style="margin-top: 1rem; color: var(--text-secondary);">Loading your sessions...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Chat Modal -->
    <div id="chatModal" class="modal" style="display: none;">
        <div class="modal-content chat-modal">
            <!-- Header -->
            <div class="chat-header">
                <h3 style="margin: 0;"><i class="fas fa-comments"></i> Session Chat & Meeting Links</h3>
                <span onclick="closeChatModal()" style="color: white; font-size: 1.5rem; cursor: pointer; font-weight: bold;">&times;</span>
            </div>
            
            <!-- Meeting Links Panel -->
            <div class="meeting-links-panel" id="meetingLinksPanel">
                <div class="meeting-links-title">
                    <i class="fas fa-video"></i> Quick Meeting Links
                </div>
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                    <button class="meeting-link-btn" onclick="insertMeetingLink('https://meet.google.com/new')">
                        <i class="fab fa-google"></i> Google Meet
                    </button>
                    <button class="meeting-link-btn" onclick="insertMeetingLink('https://zoom.us/j/')">
                        <i class="fas fa-video"></i> Zoom
                    </button>
                    <button class="meeting-link-btn" onclick="insertMeetingLink('https://teams.microsoft.com/l/meetup-join/')">
                        <i class="fas fa-users"></i> Teams
                    </button>
                    <button class="meeting-link-btn" onclick="insertMeetingLink('https://whereby.com/')">
                        <i class="fas fa-link"></i> Whereby
                    </button>
                </div>
            </div>
            
            <!-- Messages Area -->
            <div id="chatMessages" class="chat-messages-area">
                <div style="text-align: center; color: #64748b; padding: 2rem;">Select a meeting link above or type a message</div>
            </div>
            
            <!-- Input Area -->
            <div class="chat-input-area">
                <input type="text" id="chatInput" class="chat-input" 
                       placeholder="Type message or paste meeting link...">
                <button class="chat-send-btn" onclick="sendChatMessage()">
                    <i class="fas fa-paper-plane"></i> Send
                </button>
            </div>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="notification" class="notification"></div>

    <script src="../js/main.js"></script>
    <script src="../js/notifications.js"></script>
    
    <script>
        // Global variables
        let allSessions = [];
        let currentChatSessionId = null;
        let messageRefreshInterval = null;
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            console.log('My Sessions page loaded');
            loadUserInfo();
            loadSessions();
        });
        
        // Load user info
        function loadUserInfo() {
            const user = getCurrentUser();
            if (user) {
                document.getElementById('userName').textContent = user.username || 'User';
                document.getElementById('userCredits').textContent = `Credits: ${user.credits || 0}`;
            }
        }
        
        // Load sessions from API
        async function loadSessions() {
            const token = localStorage.getItem('token');
            
            if (!token) {
                showNotification('Please login first', 'error');
                window.location.href = '/';
                return;
            }
            
            try {
                console.log('Fetching sessions...');
                const response = await fetch(`${API_URL}/api/sessions/my-sessions`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Sessions data:', data);
                
                if (data.sessions && data.sessions.length > 0) {
                    allSessions = data.sessions;
                    displaySessions(allSessions);
                } else {
                    allSessions = [];
                    displayNoSessions();
                }
                
            } catch (error) {
                console.error('Error loading sessions:', error);
                displayError(error.message);
            }
        }
        
        // Display no sessions message
        function displayNoSessions() {
            const container = document.getElementById('sessionsList');
            if (!container) return;
            
            container.innerHTML = `
                <div class="error-container">
                    <i class="fas fa-calendar-times error-icon"></i>
                    <h3>No Sessions Found</h3>
                    <p style="color: var(--text-secondary); margin: 1rem 0;">You don't have any sessions yet.</p>
                    <a href="browse-skills.html" class="btn btn-primary">
                        <i class="fas fa-search"></i> Browse Skills
                    </a>
                </div>
            `;
        }
        
        // Display error message
        function displayError(message) {
            const container = document.getElementById('sessionsList');
            if (!container) return;
            
            container.innerHTML = `
                <div class="error-container">
                    <i class="fas fa-exclamation-circle error-icon"></i>
                    <h3>Failed to Load Sessions</h3>
                    <p style="color: var(--text-secondary); margin: 1rem 0;">${message}</p>
                    <button class="btn btn-primary" onclick="loadSessions()">
                        <i class="fas fa-sync-alt"></i> Try Again
                    </button>
                </div>
            `;
        }
        
        // Filter sessions by status
        function filterSessions(status) {
            // Update active tab
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Filter sessions
            const filtered = status === 'all' 
                ? allSessions 
                : allSessions.filter(s => s.status === status);
            
            displaySessions(filtered);
        }
        
        // Display sessions
        function displaySessions(sessions) {
            const container = document.getElementById('sessionsList');
            if (!container) return;
            
            const user = getCurrentUser();
            
            if (!sessions || sessions.length === 0) {
                displayNoSessions();
                return;
            }
            
            container.innerHTML = sessions.map(session => {
                const isTeacher = session.teacher_id == user?.id;
                const otherUser = isTeacher ? session.learner_name : session.teacher_name;
                
                const skillName     = session.skill_name || 'Skill Session';
                const otherUserName = otherUser || 'User';
                const scheduledTime = session.scheduled_time ? formatDate(session.scheduled_time) : 'Not scheduled';
                const duration      = session.duration || 0;
                const credits       = session.credits_allocated || 0;
                const status        = session.status || 'pending';

                // Determine confirmation state for THIS user
                const myConfirmed    = isTeacher
                    ? (session.teacher_confirmed == 1 || session.teacher_confirmed === true)
                    : (session.learner_confirmed == 1 || session.learner_confirmed === true);
                const theyConfirmed  = isTeacher
                    ? (session.learner_confirmed == 1 || session.learner_confirmed === true)
                    : (session.teacher_confirmed == 1 || session.teacher_confirmed === true);

                // Confirmation notice
                let confirmNote = '';
                if (status === 'ongoing' || status === 'completed') {
                    if (session.credits_transferred > 0) {
                        confirmNote = `<div style="margin-top:6px;font-size:0.8rem;color:#16a34a;"><i class="fas fa-check-circle"></i> Session complete — ${session.credits_transferred} credits transferred</div>`;
                    } else if (myConfirmed && !theyConfirmed) {
                        confirmNote = `<div style="margin-top:6px;font-size:0.8rem;color:#f59e0b;"><i class="fas fa-clock"></i> You confirmed — waiting for ${escapeHtml(otherUserName)} to confirm</div>`;
                    } else if (!myConfirmed && theyConfirmed) {
                        confirmNote = `<div style="margin-top:6px;font-size:0.8rem;color:#6366f1;"><i class="fas fa-exclamation-circle"></i> ${escapeHtml(otherUserName)} confirmed — your confirmation needed to release credits</div>`;
                    }
                }

                // Show "Confirm Complete" only if ongoing and not yet confirmed by me
                const showConfirm = status === 'ongoing' && !myConfirmed;

                // Course progress bar — visible to BOTH teacher and learner
                const totalPlanned = parseInt(session.total_planned_sessions) || 0;
                const completedSessions = parseInt(session.completed_session_count) || 0;
                const progressPct = totalPlanned > 0 ? Math.min(100, Math.round((completedSessions / totalPlanned) * 100)) : 0;
                const isCourseDone = totalPlanned > 0 && completedSessions >= totalPlanned;

                let progressBar = '';
                if (totalPlanned > 0) {
                    const barColor = isCourseDone
                        ? 'linear-gradient(90deg,#10b981,#34d399)'
                        : 'linear-gradient(90deg,#6366f1,#8b5cf6)';
                    const statusLabel = isCourseDone
                        ? '<span style="color:#16a34a;font-weight:600;"><i class="fas fa-graduation-cap"></i> Course Complete</span>'
                        : `<span style="color:#6366f1;font-weight:700;">${completedSessions}/${totalPlanned} sessions &nbsp;·&nbsp; ${progressPct}%</span>`;

                    progressBar = `
                        <div style="margin-top:10px;background:#f9fafb;border-radius:10px;padding:10px 12px;border:1px solid #f3f4f6;">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                                <span style="font-size:0.74rem;font-weight:600;color:#6b7280;"><i class="fas fa-tasks"></i> Course Progress</span>
                                ${statusLabel}
                            </div>
                            <div style="height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden;">
                                <div style="height:100%;width:${progressPct}%;background:${barColor};border-radius:999px;transition:width 0.5s ease;"></div>
                            </div>
                            <div style="font-size:0.72rem;color:#9ca3af;margin-top:5px;display:flex;align-items:center;gap:4px;">
                                <i class="fas fa-info-circle" style="color:#6366f1;"></i>
                                Credits transfer only after both ${isTeacher ? 'you and learner' : 'you and teacher'} confirm each session complete
                            </div>
                        </div>`;
                }

                return `
                    <div class="session-item">
                        <div class="session-info">
                            <h3>${escapeHtml(skillName)}</h3>
                            <div class="session-meta">
                                <span><i class="fas fa-user"></i> ${escapeHtml(otherUserName)}</span>
                                <span><i class="fas fa-calendar"></i> ${scheduledTime}</span>
                                <span><i class="fas fa-clock"></i> ${duration} hrs</span>
                                <span><i class="fas fa-coins"></i> ${credits} credits</span>
                            </div>
                            ${progressBar}
                            ${confirmNote}
                        </div>
                        <div class="session-actions">
                            <span class="session-status status-${status}">${status}</span>
                            ${status === 'pending' && isTeacher ? `
                                <button class="btn btn-primary" onclick="acceptSession(${session.id})">
                                    <i class="fas fa-check"></i> Accept
                                </button>` : ''}
                            ${status === 'accepted' ? `
                                <button class="btn btn-primary" onclick="startSession(${session.id})">
                                    <i class="fas fa-play"></i> Start Session
                                </button>` : ''}
                            ${showConfirm ? `
                                <button class="btn btn-success" onclick="completeSession(${session.id})">
                                    <i class="fas fa-check-double"></i> Confirm Complete
                                </button>` : ''}
                            ${(status === 'pending' || status === 'accepted' || status === 'ongoing') ? `
                                <button class="btn btn-outline" onclick="openChatModal(${session.id})">
                                    <i class="fas fa-comments"></i> Chat
                                </button>` : ''}
                            ${(status === 'pending' || status === 'accepted') ? `
                                <button class="btn btn-danger" onclick="cancelSession(${session.id})">
                                    <i class="fas fa-times"></i> Cancel
                                </button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Accept session
        window.acceptSession = async function(sessionId) {
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_URL}/api/sessions/${sessionId}/accept`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    showNotification('Session accepted!', 'success');
                    loadSessions();
                } else {
                    const data = await response.json();
                    showNotification(data.error || 'Failed to accept session', 'error');
                }
            } catch (error) {
                console.error('Error accepting session:', error);
                showNotification('Error accepting session', 'error');
            }
        };
        
        // Start session
        window.startSession = async function(sessionId) {
            if (!confirm('Start this session now?')) return;
            
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_URL}/api/sessions/${sessionId}/start`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    showNotification('Session started!', 'success');
                    loadSessions();
                } else {
                    const data = await response.json();
                    showNotification(data.error || 'Failed to start session', 'error');
                }
            } catch (error) {
                console.error('Error starting session:', error);
                showNotification('Error starting session', 'error');
            }
        };
        
        // Complete session
        window.completeSession = async function(sessionId) {
            if (!confirm('Confirm this session is complete?\n\nCredits will only transfer after BOTH you and the other person confirm.')) return;
            
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_URL}/api/sessions/${sessionId}/confirm`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    if (data.bothConfirmed) {
                        showNotification('Session complete! ' + data.creditsTransferred + ' credits transferred.', 'success');
                    } else {
                        showNotification('Your confirmation saved. Waiting for the other person to confirm before credits are released.', 'success');
                    }
                    loadSessions();
                } else {
                    showNotification(data.error || 'Failed to confirm session', 'error');
                }
            } catch (error) {
                showNotification('Error confirming session', 'error');
            }
        };
        
        // Cancel session
        window.cancelSession = async function(sessionId) {
            const reason = prompt('Please provide a reason for cancellation:');
            if (!reason) return;
            
            if (!confirm('Are you sure you want to cancel this session?')) return;
            
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_URL}/api/sessions/${sessionId}/cancel`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ reason })
                });
                
                if (response.ok) {
                    showNotification('Session cancelled', 'info');
                    loadSessions();
                } else {
                    const data = await response.json();
                    showNotification(data.error || 'Failed to cancel session', 'error');
                }
            } catch (error) {
                console.error('Error cancelling session:', error);
                showNotification('Error cancelling session', 'error');
            }
        };
        
        // ============ CHAT FUNCTIONS ============
        
        // Open chat modal
        window.openChatModal = function(sessionId) {
            console.log('Opening chat for session:', sessionId);
            
            currentChatSessionId = sessionId;
            
            // Show modal
            const chatModal = document.getElementById('chatModal');
            if (chatModal) {
                chatModal.style.display = 'block';
            }
            
            // Load messages
            loadChatMessages(sessionId);
            
            // Start auto-refresh (every 3 seconds)
            if (messageRefreshInterval) {
                clearInterval(messageRefreshInterval);
            }
            messageRefreshInterval = setInterval(() => {
                if (currentChatSessionId) {
                    loadChatMessages(currentChatSessionId, true);
                }
            }, 3000);
        };
        
        // Close chat modal
        window.closeChatModal = function() {
            const chatModal = document.getElementById('chatModal');
            if (chatModal) {
                chatModal.style.display = 'none';
            }
            
            // Stop auto-refresh
            if (messageRefreshInterval) {
                clearInterval(messageRefreshInterval);
                messageRefreshInterval = null;
            }
            
            currentChatSessionId = null;
        };
        
        // Load chat messages
        async function loadChatMessages(sessionId, isSilent = false) {
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_URL}/api/messages/${sessionId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    displayChatMessages(data.messages || []);
                }
            } catch (error) {
                console.error('Error loading messages:', error);
                if (!isSilent) {
                    showNotification('Failed to load messages', 'error');
                }
            }
        }
        
        // Display chat messages
        function displayChatMessages(messages) {
            const container = document.getElementById('chatMessages');
            if (!container) return;
            
            const user = getCurrentUser();
            
            if (messages.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #64748b; padding: 2rem;">No messages yet. Share a meeting link to start!</div>';
                return;
            }
            
            // Check if we need to scroll to bottom
            const shouldScroll = container.scrollHeight - container.scrollTop - container.clientHeight < 100;
            
            container.innerHTML = messages.map(msg => {
                const isSent = msg.sender_id == user?.id;
                
                // Format time
                let timeStr = '';
                if (msg.created_at) {
                    const time = new Date(msg.created_at);
                    timeStr = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }
                
                // Convert URLs to clickable links
                let content = escapeHtml(msg.content || '');
                content = linkify(content);
                
                return `
                    <div class="message ${isSent ? 'sent' : 'received'}">
                        <div class="sender-name">${escapeHtml(msg.sender_name || 'User')}</div>
                        <div>${content}</div>
                        <div class="message-time">${timeStr}</div>
                    </div>
                `;
            }).join('');
            
            // Scroll to bottom if needed
            if (shouldScroll || messages.length > 0) {
                container.scrollTop = container.scrollHeight;
            }
        }
        
        // Convert URLs to clickable links
        function linkify(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, function(url) {
                return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
            });
        }
        
        // Insert meeting link into input
        window.insertMeetingLink = function(link) {
            const input = document.getElementById('chatInput');
            if (input) {
                input.value = link;
                input.focus();
            }
        };
        
        // Send chat message
        window.sendChatMessage = async function() {
            const input = document.getElementById('chatInput');
            if (!input) return;
            
            const message = input.value.trim();
            if (!message) {
                showNotification('Please enter a message', 'error');
                return;
            }
            
            if (!currentChatSessionId) {
                showNotification('No active session', 'error');
                return;
            }
            
            const token = localStorage.getItem('token');
            const user = getCurrentUser();
            
            try {
                const response = await fetch(`${API_URL}/api/messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        sessionId: currentChatSessionId,
                        content: message
                    })
                });
                
                if (response.ok) {
                    // Clear input
                    input.value = '';
                    
                    // Reload messages
                    await loadChatMessages(currentChatSessionId);
                } else {
                    const data = await response.json();
                    showNotification(data.error || 'Failed to send message', 'error');
                }
            } catch (error) {
                console.error('Error sending message:', error);
                showNotification('Failed to send message', 'error');
            }
        };
        
        // Allow Enter key to send
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.target.id === 'chatInput') {
                sendChatMessage();
            }
        });
    </script>
</body>
</html>

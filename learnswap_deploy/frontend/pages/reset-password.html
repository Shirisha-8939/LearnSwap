<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - LearnSwap</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-primary); }
        .reset-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            text-align: center;
        }
        .reset-card .logo { font-size: 2rem; margin-bottom: 0.5rem; }
        .reset-card h2 { margin-bottom: 0.5rem; color: var(--text-primary); }
        .reset-card p { color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.95rem; }
        .form-group { text-align: left; margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 500; color: var(--text-primary); font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1.5px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); font-size: 1rem; box-sizing: border-box; transition: border-color 0.2s; }
        .form-group input:focus { outline: none; border-color: var(--primary-color); }
        .password-strength { margin-top: 0.4rem; font-size: 0.8rem; height: 1rem; }
        #invalidToken, #successMsg { display: none; padding: 1rem; border-radius: 10px; margin-bottom: 1rem; font-size: 0.95rem; }
        #invalidToken { background: #fee2e2; color: #b91c1c; }
        #successMsg { background: #dcfce7; color: #166534; }
        .back-link { display: inline-block; margin-top: 1.2rem; color: var(--primary-color); font-size: 0.9rem; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="reset-card">
        <div style="font-size:2rem;margin-bottom:0.5rem;"><i class="fas fa-key" style="color:#6366f1;"></i></div>
        <h2>Set New Password</h2>
        <p>Choose a strong password for your LearnSwap account.</p>

        <div id="invalidToken">
            <i class="fas fa-exclamation-circle"></i>
            This reset link is invalid or has expired. <a href="/" style="color:inherit;font-weight:600;">Request a new one</a>.
        </div>

        <div id="successMsg">
            <i class="fas fa-check-circle"></i>
            Password reset successfully! <a href="/" style="color:inherit;font-weight:600;">Click here to login</a>.
        </div>

        <div id="resetForm">
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" placeholder="At least 6 characters" oninput="checkStrength()" required>
                <div class="password-strength" id="strengthText"></div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
            </div>
            <button class="btn btn-primary btn-full" id="resetBtn" onclick="handleResetPassword()">
                <i class="fas fa-lock"></i> Reset Password
            </button>
        </div>

        <a href="/" class="back-link">← Back to LearnSwap</a>
    </div>

    <!-- Notification container -->
    <div id="notification" style="display:none; position:fixed; top:1.5rem; right:1.5rem; z-index:9999; padding:1rem 1.5rem; border-radius:10px; font-weight:500; box-shadow:0 4px 16px rgba(0,0,0,0.15); max-width:340px;"></div>

    <script>
        const API_URL = window.location.origin;
        let resetToken = null;

        function showNotif(msg, type) {
            const el = document.getElementById('notification');
            el.textContent = msg;
            el.style.display = 'block';
            el.style.background = type === 'success' ? '#dcfce7' : type === 'error' ? '#fee2e2' : '#e0f2fe';
            el.style.color = type === 'success' ? '#166534' : type === 'error' ? '#b91c1c' : '#0369a1';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        function checkStrength() {
            const pw = document.getElementById('newPassword').value;
            const el = document.getElementById('strengthText');
            if (!pw) { el.textContent = ''; return; }
            if (pw.length < 6) { el.textContent = 'Too short'; el.style.color = '#ef4444'; }
            else if (pw.length < 10 || !/[A-Z]/.test(pw) || !/[0-9]/.test(pw)) { el.textContent = 'Fair strength'; el.style.color = '#f59e0b'; }
            else { el.textContent = 'Strong password'; el.style.color = '#22c55e'; }
        }

        async function verifyToken() {
            const params = new URLSearchParams(window.location.search);
            resetToken = params.get('token');

            if (!resetToken) {
                document.getElementById('resetForm').style.display = 'none';
                document.getElementById('invalidToken').style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${API_URL}/api/verify-reset-token?token=${encodeURIComponent(resetToken)}`);
                const data = await res.json();
                if (!data.valid) {
                    document.getElementById('resetForm').style.display = 'none';
                    document.getElementById('invalidToken').style.display = 'block';
                }
            } catch (e) {
                document.getElementById('resetForm').style.display = 'none';
                document.getElementById('invalidToken').style.display = 'block';
            }
        }

        async function handleResetPassword() {
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (!password || password.length < 6) {
                showNotif('Password must be at least 6 characters.', 'error'); return;
            }
            if (password !== confirm) {
                showNotif('Passwords do not match.', 'error'); return;
            }

            const btn = document.getElementById('resetBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';

            try {
                const res = await fetch(`${API_URL}/api/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, password })
                });
                const data = await res.json();

                if (res.ok) {
                    document.getElementById('resetForm').style.display = 'none';
                    document.getElementById('successMsg').innerHTML =
                        '<i class="fas fa-check-circle"></i> Password reset successfully!<br>' +
                        '<small style="font-size:0.85rem;opacity:0.85;">Redirecting to login in 3 seconds...</small>';
                    document.getElementById('successMsg').style.display = 'block';
                    // Redirect to homepage after 3s — login modal will open
                    setTimeout(function() {
                        window.location.href = '/?login=1';
                    }, 3000);
                } else {
                    showNotif(data.error || 'Reset failed. Please try again.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-lock"></i> Reset Password';
                }
            } catch (e) {
                showNotif('Something went wrong. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-lock"></i> Reset Password';
            }
        }

        verifyToken();
    </script>
</body>
</html>
